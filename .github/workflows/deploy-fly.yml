name: deploy-fly

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-fly-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Build and deploy
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          flyctl deploy --local-only --build-arg "VERSION=${short_sha}"
